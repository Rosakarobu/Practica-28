<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convertidor de Temperatura</title>

  <!-- Aquí pongo los estilos de mi página -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      background-color: #fff0f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .tarjeta {
      background-color: #fbeaf0;
      border: 1px solid #f4c0d1;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 22px;
      color: #72243e;
      margin-bottom: 0.25rem;
    }

    p.subtitulo {
      font-size: 13px;
      color: #993556;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #72243e;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #f4c0d1;
      border-radius: 8px;
      background-color: #fff6f9;
      color: #4b1528;
      outline: none;
      margin-bottom: 1.25rem;
    }

    input:focus {
      border-color: #d4537e;
    }

    button {
      width: 100%;
      padding: 11px;
      font-size: 15px;
      font-weight: bold;
      background-color: #f4c0d1;
      color: #4b1528;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ed93b1;
    }

    .resultado {
      margin-top: 1.5rem;
      background-color: #fff0f5;
      border: 1px solid #f4c0d1;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: none;
    }

    .resultado p.etiqueta {
      font-size: 12px;
      color: #993556;
      margin-bottom: 4px;
    }

    .resultado p.valor {
      font-size: 20px;
      font-weight: bold;
      color: #72243e;
    }

    .formula {
      margin-top: 0.75rem;
      font-size: 12px;
      color: #993556;
    }
  </style>
</head>
<body>

  <!-- Aquí está mi formulario principal -->
  <div class="tarjeta">
    <h1>Convertidor de temperatura</h1>
    <p class="subtitulo">De Celsius a Fahrenheit</p>

    <label for="celsius">Temperatura en Celsius</label>
    <input type="number" id="celsius" placeholder="Ej: 25" />

    <button onclick="convertir()">Convertir</button>

    <!-- Aquí muestro el resultado después de hacer el cálculo -->
    <div class="resultado" id="resultado">
      <p class="etiqueta">Resultado</p>
      <p class="valor" id="texto-resultado"></p>
      <p class="formula" id="texto-formula"></p>
    </div>
  </div>

  <!-- Aquí va mi lógica en JavaScript -->
  <script>
    function convertir() {
      const celsius = parseFloat(document.getElementById("celsius").value);

      if (isNaN(celsius)) {
        alert("Por favor ingresa un número válido.");
        return;
      }

      const fahrenheit = (celsius * 9 / 5) + 32;

      document.getElementById("texto-resultado").textContent =
        celsius + " Celsius = " + fahrenheit.toFixed(1) + " Fahrenheit";

      document.getElementById("texto-formula").textContent =
        celsius + " × 9/5 + 32 = " + fahrenheit.toFixed(1);

      document.getElementById("resultado").style.display = "block";
    }
  </script>

</body>
</html>
